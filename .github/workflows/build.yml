name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '选择编译机型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 360v6
          - ax6600
      ssh:
        description: '启用 SSH 调试'
        required: false
        default: 'false'
        type: boolean

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.device }}" = "all" ]; then
            echo 'matrix=["360v6","ax6600"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.device }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: 🧹 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 安装编译依赖
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget ccache
          sudo timedatectl set-timezone "$TZ"

      - name: 📦 克隆源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH immortalwrt
          ln -sf $GITHUB_WORKSPACE/immortalwrt $GITHUB_WORKSPACE/openwrt

      # ============ ccache 缓存 (核心加速) ============
      - name: 🚀 设置 ccache 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            immortalwrt/staging_dir
            immortalwrt/build_dir/host
            immortalwrt/build_dir/hostpkg
          key: ccache-${{ matrix.device }}-${{ hashFiles('configs/*.config') }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.device }}-${{ hashFiles('configs/*.config') }}-
            ccache-${{ matrix.device }}-

      - name: 📥 缓存 dl 下载目录
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: dl-${{ matrix.device }}-${{ hashFiles('configs/*.config') }}
          restore-keys: dl-${{ matrix.device }}-

      # ============ 自定义脚本阶段 ============
      - name: 🔧 添加第三方 feeds
        run: |
          chmod +x scripts/*.sh
          cd immortalwrt
          $GITHUB_WORKSPACE/scripts/01-feeds-update.sh

      - name: 📥 更新并安装 feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📝 应用机型配置
        run: |
          cp configs/${{ matrix.device }}.config immortalwrt/.config
          cd immortalwrt
          $GITHUB_WORKSPACE/scripts/02-pre-compile.sh
          $GITHUB_WORKSPACE/scripts/03-nginx-replace.sh
          make defconfig

      - name: 🐛 SSH 调试 (可选)
        uses: mxschmitt/action-tmate@v3
        if: github.event.inputs.ssh == 'true'
        timeout-minutes: 30

      - name: 📥 下载软件包
        run: |
          cd immortalwrt
          make download -j16
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 开始编译固件
        id: compile
        run: |
          cd immortalwrt
          echo -e "$(nproc) thread compile"
          export CCACHE_DIR=~/.ccache
          export USE_CCACHE=1
          ccache -M 5G
          make -j$(($(nproc) + 1)) || make -j1 V=s
          ccache -s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: 🔍 整理产物 & 检测插件
        if: steps.compile.outputs.status == 'success'
        run: |
          cd immortalwrt
          $GITHUB_WORKSPACE/scripts/04-post-compile.sh "${{ matrix.device }}"

      - name: 📦 打包固件与配置
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p release/${{ matrix.device }}
          cd immortalwrt/bin/targets/*/*
          # 复制固件
          cp -r *.bin *.img.gz *.trx *.ubi sha256sums 2>/dev/null release/ || true
          cd $GITHUB_WORKSPACE
          # 复制 .config 与插件清单
          cp immortalwrt/.config release/${{ matrix.device }}/${{ matrix.device }}-${{ env.BUILD_TIME }}.config
          cp immortalwrt/plugins-list.md release/${{ matrix.device }}/ 2>/dev/null || true
          # 拷贝固件
          cp -r immortalwrt/bin/targets/*/*/*.{bin,img.gz,trx,ubi} release/${{ matrix.device }}/ 2>/dev/null || true
          cp immortalwrt/bin/targets/*/*/sha256sums release/${{ matrix.device }}/ 2>/dev/null || true
          # 生成总压缩包
          cd release
          tar -czf ${{ matrix.device }}-${{ env.BUILD_TIME }}.tar.gz ${{ matrix.device }}/
          ls -alh

      - name: ⬆️ 上传到 Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ matrix.device }}-${{ env.BUILD_TIME }}
          path: release/

      - name: 🚀 发布到 Releases
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.device }}-${{ env.BUILD_TIME }}
          name: 🎉 ${{ matrix.device }} ${{ env.BUILD_TIME }}
          body_path: immortalwrt/plugins-list.md
          files: |
            release/${{ matrix.device }}/*
            release/${{ matrix.device }}-${{ env.BUILD_TIME }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: build
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: 🧹 清理旧 Releases (每机型保留最新 20 个)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 40   # 两机型共 40 个 = 每个 20 个
          delete_tags: true
          delete_tag_pattern: "^(360v6|ax6600)-"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}